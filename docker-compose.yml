services:
  class-swap:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      ALLOW_ORIGINS: ${ALLOW_ORIGINS:-http://localhost:8000}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-school-swap-session}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-1209600}
      DATABASE_PATH: /app/data/class_swap.db
      PREVIEW_DIR: /app/data/import_previews
      TIMETABLE_TEMPLATE_PATH: /app/data/templates/주간시간표_표준양식.xlsx
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-1234}
      DEFAULT_TEACHER_PASSWORD: ${DEFAULT_TEACHER_PASSWORD:-1234}
    volumes:
      - class-swap-data:/app/data
    restart: unless-stopped

volumes:
  class-swap-data:
